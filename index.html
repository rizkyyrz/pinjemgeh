<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <title>Dashboard Penyewaan iPhone - Dev</title>
    <style>
      :root {
        --bg: #0f172a;
        --bg-soft: #f8fafc;
        --card: rgba(255,255,255,0.88);
        --card-solid: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --success: #16a34a;
        --warning: #f59e0b;
        --danger: #ef4444;
        --shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(37,99,235,0.15), transparent 30%),
          radial-gradient(circle at top right, rgba(14,165,233,0.12), transparent 25%),
          linear-gradient(180deg, #eff6ff 0%, #f8fafc 45%, #f8fafc 100%);
        color: var(--text);
      }

      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }

      .hero {
        background: linear-gradient(135deg, #0f172a, #1e3a8a 65%, #2563eb);
        color: white;
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(30, 58, 138, 0.28);
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        top: -60px;
        right: -60px;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 10px 0 0;
        color: rgba(255,255,255,0.82);
        max-width: 680px;
        font-size: 15px;
      }

      .hero-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: none;
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 14px;
        transition: 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-light {
        background: rgba(255,255,255,0.14);
        color: white;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15);
      }

      .btn-white {
        background: white;
        color: var(--primary-dark);
      }

      .btn-social {
        width: 46px;
        height: 46px;
        padding: 0;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.18);
        backdrop-filter: blur(8px);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      }

      .btn-social svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .btn-social.ig {
        background: linear-gradient(135deg, #f97316 0%, #ec4899 55%, #8b5cf6 100%);
        color: #fff;
      }

      .btn-social.tt {
        background: rgba(15, 23, 42, 0.92);
        color: #fff;
      }

      .btn-social:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.24);
      }

      .stats-grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .stat-card {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 18px;
      }

      .stat-label {
        color: rgba(255,255,255,0.72);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 800;
      }

      .content-card {
        background: var(--card);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.55);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1.4fr 220px 160px;
        gap: 14px;
        margin-bottom: 18px;
      }

      .input-wrap,
      .select-wrap {
        background: white;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        min-height: 52px;
      }

      .input-wrap input,
      .select-wrap select {
        width: 100%;
        border: none;
        outline: none;
        font-size: 14px;
        background: transparent;
        color: var(--text);
      }

      .btn-refresh {
        background: var(--text);
        color: white;
        border-radius: 16px;
        min-height: 52px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      }

      .table-shell {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
      }

      thead th {
        background: #f8fafc;
        color: #334155;
        text-align: left;
        font-size: 13px;
        font-weight: 800;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      tbody td {
        padding: 18px;
        font-size: 14px;
        color: #334155;
        border-bottom: 1px solid #eef2f7;
        vertical-align: middle;
      }

      tbody tr:hover {
        background: #f8fbff;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .name-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .name-main {
        font-weight: 700;
        color: #0f172a;
      }

      .name-sub {
        font-size: 12px;
        color: var(--muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.85;
      }

      .booking {
        background: rgba(245, 158, 11, 0.12);
        color: #b45309;
      }

      .disewa {
        background: rgba(37, 99, 235, 0.12);
        color: #1d4ed8;
      }

      .selesai {
        background: rgba(22, 163, 74, 0.12);
        color: #15803d;
      }

      .catatan-box {
        max-width: 240px;
        color: var(--muted);
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .loading,
      .empty {
        text-align: center;
        padding: 30px 16px;
        color: var(--muted);
        background: white;
        border-radius: 18px;
      }

      .footer-note {
        margin-top: 14px;
        text-align: right;
        color: var(--muted);
        font-size: 12px;
      }

      .pagination {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .page-btn {
        min-width: 40px;
        height: 40px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        transition: 0.2s ease;
      }

      .page-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        border-color: #cbd5e1;
      }

      .page-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .page-info {
        width: 100%;
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
      }

      @media (max-width: 1024px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .toolbar {
          grid-template-columns: 1fr 1fr;
        }

        .btn-refresh {
          grid-column: span 2;
        }
      }

      @media (max-width: 640px) {
        .hero h1 {
          font-size: 26px;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .btn-refresh {
          grid-column: auto;
        }

        .container {
          padding: 18px 14px 30px;
        }

        .hero,
        .content-card {
          border-radius: 22px;
        }

        .hero-actions {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1>Dashboard Rental iPhone</h1>
            <p>
              Berikut status penyewaan iPhone di PinjemGeh by PT RZKYPay Solusi Digital
            </p>
          </div>

          <div class="hero-actions">
            <a class="btn btn-light" href="/syarat/">Syarat & Ketentuan</a>
            <button class="btn btn-light" onclick="loadData()">Refresh Data</button>

            <a
              class="btn btn-social ig"
              href="https://instagram.com/pinjemgeh.id"
              target="_blank"
              rel="noopener noreferrer"
              title="Instagram"
              aria-label="Instagram"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5a4.25 4.25 0 0 0 4.25 4.25h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5Zm8.88 2.38a1.12 1.12 0 1 1 0 2.24 1.12 1.12 0 0 1 0-2.24ZM12 6.5A5.5 5.5 0 1 1 6.5 12 5.5 5.5 0 0 1 12 6.5Zm0 1.5A4 4 0 1 0 16 12a4 4 0 0 0-4-4Z"/>
              </svg>
            </a>

            <a
              class="btn btn-social tt"
              href="https://tiktok.com/@sewaiphone.serang"
              target="_blank"
              rel="noopener noreferrer"
              title="TikTok"
              aria-label="TikTok"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 3c.39 2.1 1.63 3.52 3.64 4.11.68.2 1.34.28 1.86.3v2.86a8.36 8.36 0 0 1-3.97-1.15v6.39c0 3.38-2.67 5.99-6.13 5.99S3.77 18.85 3.77 15.63c0-3.5 2.92-6.17 6.56-5.92v2.93c-1.9-.24-3.54 1.1-3.54 2.96 0 1.7 1.36 2.94 3.1 2.94 1.79 0 3.08-1.24 3.08-3.08V3h1.53Z"/>
              </svg>
            </a>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Data</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Booking</div>
            <div class="stat-value" id="statBooking">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Sedang Disewa</div>
            <div class="stat-value" id="statDisewa">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Selesai</div>
            <div class="stat-value" id="statSelesai">0</div>
          </div>
        </div>
      </section>

      <section class="content-card">
        <div class="toolbar">
          <div class="input-wrap">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari nama penyewa atau tipe iPhone..."
              onkeyup="handleFilterChange()"
            />
          </div>

          <div class="select-wrap">
            <select id="statusFilter" onchange="handleFilterChange()">
              <option value="">Semua Status</option>
              <option value="Booking">Booking</option>
              <option value="Sedang Disewa">Sedang Disewa</option>
              <option value="Selesai">Selesai</option>
            </select>
          </div>

          <button class="btn-refresh" onclick="loadData()">Muat Ulang</button>
        </div>

        <div id="tableContainer">
          <div class="loading">Memuat data penyewaan...</div>
        </div>

        <div class="footer-note">
          Dashboard dibuat untuk monitoring data rental iPhone secara real-time.
          Dibuat oleh Muhammad Rizky Ramadhan
        </div>
      </section>
    </div>

    <script src="config.js"></script>
    <script>
      let allData = [];
      let currentPage = 1;
      const rowsPerPage = 10;
      const API_URL = window.APP_CONFIG.API_BASE_URL;

      function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parseDateValue(value) {
        if (!value) return 0;

        const directDate = new Date(value);
        if (!isNaN(directDate.getTime())) {
          return directDate.getTime();
        }

        const str = String(value).trim();

        const ddmmyyyy = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if (ddmmyyyy) {
          const day = parseInt(ddmmyyyy[1], 10);
          const month = parseInt(ddmmyyyy[2], 10) - 1;
          const year = parseInt(ddmmyyyy[3], 10);
          return new Date(year, month, day).getTime();
        }

        const yyyymmdd = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
        if (yyyymmdd) {
          const year = parseInt(yyyymmdd[1], 10);
          const month = parseInt(yyyymmdd[2], 10) - 1;
          const day = parseInt(yyyymmdd[3], 10);
          return new Date(year, month, day).getTime();
        }

        return 0;
      }

      function sortNewestFirst(data) {
        return data.sort(function(a, b) {
          const dateA = parseDateValue(a.tanggalSewa);
          const dateB = parseDateValue(b.tanggalSewa);
          return dateB - dateA;
        });
      }

      async function loadData() {
        document.getElementById('tableContainer').innerHTML =
          '<div class="loading">Memuat data penyewaan...</div>';

        try {
          const res = await fetch(API_URL + '?action=publicData', {
            method: 'GET'
          });

          const result = await res.json();

          if (!result.success) {
            throw new Error(result.message || 'Gagal memuat data.');
          }

          allData = Array.isArray(result.data) ? result.data : [];
          sortNewestFirst(allData);

          currentPage = 1;
          updateStats(allData);
          renderTable();
        } catch (err) {
          console.error('Load dashboard error:', err);
          allData = [];
          currentPage = 1;
          updateStats(allData);
          document.getElementById('tableContainer').innerHTML =
            '<div class="empty">Gagal memuat data.</div>';
        }
      }

      function updateStats(data) {
        const total = data.length;
        const booking = data.filter(function(item) { return item.status === 'Booking'; }).length;
        const disewa = data.filter(function(item) { return item.status === 'Sedang Disewa'; }).length;
        const selesai = data.filter(function(item) { return item.status === 'Selesai'; }).length;

        document.getElementById('statTotal').innerText = total;
        document.getElementById('statBooking').innerText = booking;
        document.getElementById('statDisewa').innerText = disewa;
        document.getElementById('statSelesai').innerText = selesai;
      }

      function getStatusBadge(status) {
        if (status === 'Booking') {
          return '<span class="badge booking">Booking</span>';
        }
        if (status === 'Sedang Disewa') {
          return '<span class="badge disewa">Sedang Disewa</span>';
        }
        if (status === 'Selesai') {
          return '<span class="badge selesai">Selesai</span>';
        }
        return '<span class="badge">' + escapeHtml(status || '-') + '</span>';
      }

      function handleFilterChange() {
        currentPage = 1;
        renderTable();
      }

      function changePage(page) {
        currentPage = page;
        renderTable();
      }

      function renderPagination(totalItems, totalPages) {
        if (totalPages <= 1) return '';

        let html = '<div class="pagination">';

        html += `
          <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
            Prev
          </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
          html += `
            <button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
              ${i}
            </button>
          `;
        }

        html += `
          <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
            Next
          </button>
        `;

        const startItem = totalItems === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
        const endItem = Math.min(currentPage * rowsPerPage, totalItems);

        html += `
          <div class="page-info">
            Menampilkan ${startItem}-${endItem} dari ${totalItems} data
          </div>
        `;

        html += '</div>';
        return html;
      }

      function renderTable() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        const statusFilter = document.getElementById('statusFilter').value;

        const filtered = allData.filter(function(item) {
          const matchKeyword =
            (item.nama || '').toLowerCase().includes(keyword) ||
            (item.tipeIphone || '').toLowerCase().includes(keyword);

          const matchStatus = !statusFilter || item.status === statusFilter;

          return matchKeyword && matchStatus;
        });

        if (!filtered.length) {
          document.getElementById('tableContainer').innerHTML =
            '<div class="empty">Tidak ada data yang cocok dengan pencarian.</div>';
          return;
        }

        const totalPages = Math.ceil(filtered.length / rowsPerPage);

        if (currentPage > totalPages) {
          currentPage = totalPages;
        }

        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const paginatedData = filtered.slice(startIndex, endIndex);

        let html = `
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>Penyewa</th>
                  <th>Perangkat</th>
                  <th>Tanggal Sewa</th>
                  <th>Tanggal Kembali</th>
                  <th>Status</th>
                  <th>Catatan</th>
                </tr>
              </thead>
              <tbody>
        `;

        paginatedData.forEach(function(item) {
          html += `
            <tr>
              <td>
                <div class="name-block">
                  <div class="name-main">${escapeHtml(item.nama || '-')}</div>
                  <div class="name-sub">ID: ${escapeHtml(item.id || '-')}</div>
                </div>
              </td>
              <td>
                <div class="name-block">
                  <div class="name-main">${escapeHtml(item.tipeIphone || '-')}</div>
                  <div class="name-sub">Unit rental</div>
                </div>
              </td>
              <td>${escapeHtml(item.tanggalSewa || '-')}</td>
              <td>${escapeHtml(item.tanggalKembali || '-')}</td>
              <td>${getStatusBadge(item.status)}</td>
              <td><div class="catatan-box">${escapeHtml(item.catatan || '-')}</div></td>
            </tr>
          `;
        });

        html += `
              </tbody>
            </table>
          </div>
          ${renderPagination(filtered.length, totalPages)}
        `;

        document.getElementById('tableContainer').innerHTML = html;
      }

      window.onload = loadData;
    </script>
  </body>
</html>
